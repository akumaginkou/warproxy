services:
  warproxy:
    image: ghcr.io/akumaginkou/warproxy:latest
    restart: always
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Asia/Tokyo
      # - WARP_PLUS=true    # Don't use with LICENSE_KEY (unstable)
      - LICENSE_KEY=your-license-key-here
      - USERNAME=
      - PASSWORD=
      - DNS=8.8.8.8         # Google DNS (外部DNS設定)
    volumes:
      - /share/CACHEDEV1_DATA/Container/warproxy:/config
    ports:
      - 1080:1080
    dns:                      # コンテナ内のDNS設定
      - 8.8.8.8              # Google DNS
      - 1.1.1.1              # Cloudflare DNS
    networks:
      - warproxy.network
    # 以下はオプション：NASがDNSキャッシュサーバーを持っている場合
    # dns:
    #   - "<NAS_IP>"
    #   - 8.8.8.8

networks:
  warproxy.network:
    external: true
    name: warproxy.network
