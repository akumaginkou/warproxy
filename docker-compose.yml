services:
  warproxy.server:
    image: ghcr.io/kingcc/warproxy:latest
    restart: always
    environment:
      # Use either WARP_PLUS or LICENSE_KEY, not both
      - WARP_PLUS=true     # Auto-refresh quota (unstable)
      # - LICENSE_KEY=your-license-key-here  # Recommended if you have one
      - ENDPOINT=162.159.192.1
      - HTTP_PORT=1081
    networks:
      - warproxy.network
    ports:
      - 127.0.0.1:1080:1080
      - 127.0.0.1:1081:1081

networks:
  warproxy.network:
    external: true
    name: warproxy.network
